# Airflow Helm Values for Docker Desktop Kubernetes
# Adapted from INSTALL_DATASURFACE.md for local development

executor: CeleryExecutor

# Airflow version
images:
  airflow:
    repository: apache/airflow
    tag: "3.1.7"

# External PostgreSQL (running in Docker, accessible via host.docker.internal)
postgresql:
  enabled: false

data:
  metadataConnection:
    user: postgres
    pass: password
    protocol: postgresql
    host: host.docker.internal
    port: 5432
    db: airflow_db

# Redis for Celery broker
redis:
  enabled: true
  persistence:
    enabled: true
    storageClassName: standard

# Single scheduler for local dev
scheduler:
  replicas: 1
  logGroomerSidecar:
    retentionDays: 2

# Single worker for local dev
workers:
  replicas: 1
  persistence:
    enabled: true
    storageClassName: standard
  logGroomerSidecar:
    retentionDays: 2

# API server with NodePort for local access
apiServer:
  service:
    type: NodePort

# DAG processor
dagProcessor:
  enabled: true
  logGroomerSidecar:
    retentionDays: 2

# Triggerer for async sensors
triggerer:
  enabled: true
  logGroomerSidecar:
    retentionDays: 2

# GitSync for DAGs - pulls from GitHub repository
dags:
  persistence:
    enabled: false
  gitSync:
    enabled: true
    repo: https://github.com/datasurface/demo1_airflow.git  # Change to your DAG repo
    branch: main
    subPath: dags
    wait: 60
    credentialsSecret: git-dags  # Secret must have GITSYNC_USERNAME and GITSYNC_PASSWORD keys

# Logs - enable persistence for Docker Desktop (hostpath works for single-node clusters with RWX)
logs:
  persistence:
    enabled: true
    storageClassName: hostpath
    size: 25Gi

config:
  core:
    parallelism: "64"
  celery:
    worker_concurrency: "4"
  logging:
    delete_local_logs: "False"
  scheduler:
    dag_dir_list_interval: "60"
    max_tis_per_query: "512"
    max_dagruns_to_create_per_loop: "100"
    max_dagruns_per_loop_to_schedule: "200"

# Cleanup CronJob - purges old metadata to prevent scheduler slowdown
# With many DAGs on frequent schedules, dag_run and task_instance tables grow rapidly
cleanup:
  enabled: true
  schedule: "*/30 * * * *"
  args: ["bash", "-c", "exec airflow db clean --clean-before-timestamp \"$(date -u -d '2 days ago' +%Y-%m-%dT%H:%M:%S)\" --skip-archive -y -t celery_taskmeta -t dag_run -t task_instance -t task_instance_history -t job -t log && exec airflow kubernetes cleanup-pods --namespace={{ .Release.Namespace }}"]

# PgBouncer connection pooler - transaction mode returns connections to the pool
# after each transaction, preventing stale connection issues after DB restarts
pgbouncer:
  enabled: true
  metadataPoolSize: 25
  resultBackendPoolSize: 10
  maxClientConn: 200
  extraIni: |
    pool_mode = transaction
    server_reset_query = DISCARD ALL

# Web UI credentials
webserver:
  defaultUser:
    enabled: true
    username: admin
    password: admin
