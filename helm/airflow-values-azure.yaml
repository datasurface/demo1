# Airflow Helm Values for Azure AKS
# Used with: helm install airflow apache-airflow/airflow -f helm/airflow-values-azure.yaml
# Environment-specific values are replaced by setup-walkthrough-azure during deployment.

executor: CeleryExecutor

# Custom Airflow image with the database drivers required by this starter.
# The baseline uses namespace-local Kubernetes Secrets; ESO/Key Vault is optional.
# Pre-built and hosted on GitLab - pulled with the same datasurface-registry secret
images:
  airflow:
    repository: registry.gitlab.com/datasurface-inc/datasurface/airflow
    tag: "3.3.0-azure-supported-merge-drivers-20260714"

# Registry secret for pulling custom Airflow image from GitLab
registry:
  secretName: datasurface-registry

# External Azure Database for PostgreSQL Flexible Server
postgresql:
  enabled: false

data:
  metadataSecretName: airflow-metadata

# Redis for Celery broker
redis:
  enabled: true
  persistence:
    enabled: true
    storageClassName: azurefile-csi-nfs

# Scheduler
scheduler:
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
  logGroomerSidecar:
    retentionDays: 2

# Workers
workers:
  replicas: 1
  persistence:
    enabled: true
    storageClassName: azurefile-csi-nfs
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  logGroomerSidecar:
    retentionDays: 2

# API server
apiServer:
  service:
    type: ClusterIP

# DAG processor
dagProcessor:
  enabled: true
  logGroomerSidecar:
    retentionDays: 2

# Triggerer
triggerer:
  enabled: true
  logGroomerSidecar:
    retentionDays: 2

# GitSync for DAGs
dags:
  persistence:
    enabled: false
  gitSync:
    enabled: true
    repo: https://github.com/PLACEHOLDER_AIRFLOW_REPO.git
    branch: main
    subPath: dags
    wait: 60
    credentialsSecret: git-dags

# Logs
logs:
  persistence:
    enabled: true
    storageClassName: azurefile-csi-nfs
    size: 25Gi

config:
  core:
    parallelism: "128"
  celery:
    worker_concurrency: "8"
  logging:
    delete_local_logs: "False"
  scheduler:
    dag_dir_list_interval: "60"
    max_tis_per_query: "512"
    max_dagruns_to_create_per_loop: "100"
    max_dagruns_per_loop_to_schedule: "200"

# Cleanup CronJob - purges old metadata to prevent scheduler slowdown
cleanup:
  enabled: true
  schedule: "*/30 * * * *"
  args: ["bash", "-c", "exec airflow db clean --clean-before-timestamp \"$(date -u -d '2 days ago' +%Y-%m-%dT%H:%M:%S)\" --skip-archive -y -t celery_taskmeta -t dag_run -t task_instance -t task_instance_history -t job -t log && exec airflow kubernetes cleanup-pods --namespace={{ .Release.Namespace }}"]

# Airflow job service account. Cloud-vault access belongs to External Secrets
# Operator's dedicated service account, not to Airflow pods.
serviceAccount:
  create: true
  name: airflow-worker

# PgBouncer connection pooler - transaction mode returns connections to the pool
# after each transaction, preventing stale connection issues after DB restarts
pgbouncer:
  enabled: true
  metadataPoolSize: 25
  resultBackendPoolSize: 10
  maxClientConn: 200
  extraIni: |
    pool_mode = transaction
    server_reset_query = DISCARD ALL

# Web UI credentials - ALL fields required or the create-user hook job fails.
# The 'role' field is particularly important - omitting it causes an empty role error.
webserver:
  defaultUser:
    enabled: true
    role: Admin
    username: admin
    firstName: Admin
    lastName: User
    email: admin@example.com
    password: PLACEHOLDER_AIRFLOW_ADMIN_PASSWORD
