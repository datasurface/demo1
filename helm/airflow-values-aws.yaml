# Airflow Helm Values for AWS EKS
# Used with: helm install airflow apache-airflow/airflow -f helm/airflow-values-aws.yaml
# PLACEHOLDER values are replaced by the setup-walkthrough-aws skill during deployment.

executor: CeleryExecutor

# Standard Apache Airflow image
images:
  airflow:
    repository: registry.gitlab.com/datasurface-inc/datasurface/airflow
    tag: "3.1.8-azure"

# Registry secret for pulling custom Airflow image from GitLab
registry:
  secretName: datasurface-registry

# External Aurora PostgreSQL
postgresql:
  enabled: false

data:
  metadataConnection:
    user: postgres
    pass: PLACEHOLDER_DB_PASSWORD
    protocol: postgresql
    host: PLACEHOLDER_AURORA_ENDPOINT
    port: 5432
    db: airflow_db
    sslmode: require

# Redis for Celery broker
redis:
  enabled: true
  persistence:
    enabled: true
    storageClassName: efs-sc

# Scheduler
scheduler:
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
  logGroomerSidecar:
    retentionDays: 2

# Workers
workers:
  replicas: 1
  persistence:
    enabled: true
    storageClassName: efs-sc
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  logGroomerSidecar:
    retentionDays: 2

# API server
apiServer:
  service:
    type: ClusterIP

# DAG processor
dagProcessor:
  enabled: true
  logGroomerSidecar:
    retentionDays: 2

# Triggerer
triggerer:
  enabled: true
  logGroomerSidecar:
    retentionDays: 2

# GitSync for DAGs
dags:
  persistence:
    enabled: false
  gitSync:
    enabled: true
    repo: https://github.com/PLACEHOLDER_AIRFLOW_REPO.git
    branch: main
    subPath: dags
    wait: 60
    credentialsSecret: git-dags

# Logs
logs:
  persistence:
    enabled: true
    storageClassName: efs-sc
    size: 25Gi

config:
  core:
    parallelism: "128"
  celery:
    worker_concurrency: "8"
  logging:
    delete_local_logs: "False"
  scheduler:
    dag_dir_list_interval: "60"
    max_tis_per_query: "512"
    max_dagruns_to_create_per_loop: "100"
    max_dagruns_per_loop_to_schedule: "200"

# Cleanup CronJob - purges old metadata to prevent scheduler slowdown
cleanup:
  enabled: true
  schedule: "*/30 * * * *"
  args: ["bash", "-c", "exec airflow db clean --clean-before-timestamp \"$(date -u -d '2 days ago' +%Y-%m-%dT%H:%M:%S)\" --skip-archive -y -t celery_taskmeta -t dag_run -t task_instance -t task_instance_history -t job -t log && exec airflow kubernetes cleanup-pods --namespace={{ .Release.Namespace }}"]

# Service account with IRSA annotation
serviceAccount:
  create: true
  name: airflow-worker
  annotations:
    eks.amazonaws.com/role-arn: PLACEHOLDER_AIRFLOW_ROLE_ARN

# Secrets Store CSI volume for Airflow DB connection (mounted from AWS Secrets Manager)
extraVolumes:
  - name: secrets-store
    csi:
      driver: secrets-store.csi.k8s.io
      readOnly: true
      volumeAttributes:
        secretProviderClass: airflow-secrets

extraVolumeMounts:
  - name: secrets-store
    mountPath: /mnt/secrets
    readOnly: true

# AWS region for boto3 (needed by infrastructure DAG's AwsSecretManager at parse time)
env:
  - name: AWS_DEFAULT_REGION
    value: "PLACEHOLDER_AWS_REGION"
  - name: AWS_REGION
    value: "PLACEHOLDER_AWS_REGION"

# PgBouncer connection pooler - transaction mode returns connections to the pool
# after each transaction, preventing stale connection issues after DB restarts
pgbouncer:
  enabled: true
  metadataPoolSize: 25
  resultBackendPoolSize: 10
  maxClientConn: 200
  extraIni: |
    pool_mode = transaction
    server_reset_query = DISCARD ALL

# Web UI credentials
webserver:
  defaultUser:
    enabled: true
    username: admin
    password: admin
